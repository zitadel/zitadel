syntax = "proto3";

import "google/protobuf/timestamp.proto";
import "protoc-gen-openapiv2/options/annotations.proto";
import "validate/validate.proto";

import "zitadel/filter/v2/filter.proto";

package zitadel.group.v2;

option go_package = "github.com/zitadel/zitadel/pkg/grpc/group/v2;group";

message Group {
  // Unique identifier of the user group.
  string id = 1 [
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      example: "\"69629023906488334\""
    }
  ];

  // Unique name of the user group inside the corresponding organization.
  string name = 2 [
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      example: "\"Support Group\"";
    }
  ];

  // Description the user group.
  string description = 3 [
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      example: "\"Support Group\"";
    }
  ];

  // The ID of the organization to which the group belongs.
  string organization_id = 4 [
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      example: "\"69629098906488334\""
    }
  ];

  // Timestamp when the group was last changed.
  google.protobuf.Timestamp change_date = 5 [
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      example: "\"2025-01-23T10:34:18.051Z\"";
    }
  ];

  // Timestamp when the user group was created
  google.protobuf.Timestamp creation_date = 6 [
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      example: "\"2025-01-23T10:34:18.051Z\"";
    }
  ];

  // Number of users in the group.
  uint64 user_count = 7 [
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      example: "\"5\"";
    }
  ];
}

// User represents a user that is member of a group.
message User {
  // ID represents the ID of the user.
  string id = 1;
  // PreferredLoginName represents the preferred login name of the user.
  string preferred_login_name = 2;
  // DisplayName represents the public display name of the user.
  string display_name = 3;
  // AvatarURL is the URL to the user's public avatar image.
  string avatar_url = 4;
  // The organization the user belongs to.
  string organization_id = 5;
}

message GroupUser {
  // GroupID is the unique identifier of the user group.
  string group_id = 1 [
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      example: "\"69629023906488334\""
    }
  ];

  // GroupName is the name of the user group.
  string group_name = 5 [
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      example: "\"Support Group\"";
    }
  ];

  // OrganizationID is the unique identifier of the organization to which the group belongs.
  string organization_id = 2 [
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      example: "\"69629098906488334\""
    }
  ];

  // User represents the user in the user group.
  User user = 3;

  // CreationDate is the timestamp when the user was added to the group.
  google.protobuf.Timestamp creation_date = 4 [
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      example: "\"2025-01-23T10:34:18.051Z\"";
    }
  ];
}

message GroupsSearchFilter {
  oneof filter {
    option (validate.required) = true;

    // Search for groups by their IDs.
    zitadel.filter.v2.InIDsFilter group_ids = 1;
    // Search for groups by their names.
    GroupNameFilter name_filter = 2;
    // Search for groups by their organization ID.
    zitadel.filter.v2.IDFilter organization_id = 3;
    // Search for groups by their description.
    GroupDescriptionFilter description_filter = 4;
  }
}

message GroupDescriptionFilter {
  // Description of the user group.
  string description = 1 [
    (validate.rules).string = {min_len: 1, max_len: 200},
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      min_length: 1;
      max_length: 200;
      example: "\"My Group description\"";
    }
  ];

  // Defines which text comparison method is used for the description query.
  zitadel.filter.v2.TextFilterMethod method = 2 [
    (validate.rules).enum.defined_only = true,
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      description: "defines which text equality method is used";
    }
  ];
}

message GroupNameFilter {
  // Name of the user group.
  string name = 1 [
    (validate.rules).string = {min_len: 1, max_len: 200},
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      min_length: 1;
      max_length: 200;
      example: "\"My Group\"";
    }
  ];

  // Defines which text comparison method used for the name query.
  zitadel.filter.v2.TextFilterMethod method = 2 [
    (validate.rules).enum.defined_only = true,
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      description: "defines which text equality method is used";
    }
  ];
}


enum FieldName {
  FIELD_NAME_UNSPECIFIED = 0;
  FIELD_NAME_ID = 1;
  FIELD_NAME_NAME = 2;
  FIELD_NAME_CREATION_DATE = 3;
  FIELD_NAME_CHANGE_DATE = 4;
}

message GroupUsersSearchFilter {
  oneof filter {
    option (validate.required) = true;

    // Search for groups by user IDs
    zitadel.filter.v2.InIDsFilter user_ids = 1;
    // Search for users in groups by group IDs
    zitadel.filter.v2.InIDsFilter group_ids = 2;
    // Search for group memberships by the organization the groups belong to.
    zitadel.filter.v2.IDFilter organization_id = 3;
  }
}

enum GroupUserFieldName {
  GROUP_USER_FIELD_NAME_UNSPECIFIED = 0;
  GROUP_USER_FIELD_NAME_USER_ID = 1;
  GROUP_USER_FIELD_NAME_GROUP_ID = 2;
  GROUP_USER_FIELD_NAME_CREATION_DATE = 3;
}

// GroupGrant authorizes all members of a group for a project with the given roles.
message GroupGrant {
  // Unique identifier of the group grant.
  string id = 1 [
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      example: "\"69629023906488334\""
    }
  ];

  // ID of the group the grant authorizes.
  string group_id = 2 [
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      example: "\"69629023906488334\""
    }
  ];

  // Name of the group the grant authorizes, for provenance in listings.
  string group_name = 3 [
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      example: "\"Support Group\"";
    }
  ];

  // The ID of the organization the group belongs to.
  string organization_id = 4 [
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      example: "\"69629098906488334\""
    }
  ];

  // ID of the project the roles belong to.
  string project_id = 5 [
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      example: "\"69629098906488334\""
    }
  ];

  // ID of the project grant when the project is granted to the group's organization.
  string project_grant_id = 6 [
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      example: "\"69629098906488334\""
    }
  ];

  // Keys of the granted roles.
  repeated string role_keys = 7 [
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      example: "[\"admin\",\"user\"]";
    }
  ];

  // Timestamp when the group grant was created.
  google.protobuf.Timestamp creation_date = 8 [
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      example: "\"2025-01-23T10:34:18.051Z\"";
    }
  ];

  // Timestamp when the group grant was last changed.
  google.protobuf.Timestamp change_date = 9 [
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      example: "\"2025-01-23T10:34:18.051Z\"";
    }
  ];
}

message GroupGrantsSearchFilter {
  oneof filter {
    option (validate.required) = true;

    // Search for grants of the given groups.
    zitadel.filter.v2.InIDsFilter group_ids = 1;
    // Search for grants of a project.
    zitadel.filter.v2.IDFilter project_id = 2;
  }
}
