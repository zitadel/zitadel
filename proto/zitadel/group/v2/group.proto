syntax = "proto3";

import "google/api/field_behavior.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";
import "protoc-gen-openapiv2/options/annotations.proto";
import "validate/validate.proto";

import "zitadel/filter/v2/filter.proto";
import "zitadel/authorization/v2beta/authorization.proto";

package zitadel.group.v2;

option go_package = "github.com/zitadel/zitadel/pkg/grpc/group/v2;group";

// Attributes use google.protobuf.Value to allow flat JSON:
// - Single value: {"role": "admin"}
// - Multiple values: {"role": ["admin", "user"]}

message Group {
  // Unique identifier of the user group.
  string id = 1 [
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      example: "\"69629023906488334\""
    }
  ];

  // Unique name of the user group inside the corresponding organization.
  string name = 2 [
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      example: "\"Support Group\"";
    }
  ];

  // Description the user group.
  string description = 3 [
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      example: "\"Support Group\"";
    }
  ];

  // The ID of the organization to which the group belongs.
  string organization_id = 4 [
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      example: "\"69629098906488334\""
    }
  ];

  // Timestamp when the group was last changed.
  google.protobuf.Timestamp change_date = 5 [
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      example: "\"2025-01-23T10:34:18.051Z\"";
    }
  ];

  // Timestamp when the user group was created
  google.protobuf.Timestamp creation_date = 6 [
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      example: "\"2025-01-23T10:34:18.051Z\"";
    }
  ];
}

// AddGroupUser is the input form of a user to be added to a group. Unlike
// GroupUser (which is returned from list endpoints), AddGroupUser carries only
// the fields the caller provides: the user ID and optional per-user attributes.
message AddGroupUser {
  // UserID is the ID of the user to add to the group.
  string user_id = 1 [
    (validate.rules).string = {min_len: 1, max_len: 200},
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      min_length: 1;
      max_length: 200;
      example: "\"69629023906488334\"";
    },
    (google.api.field_behavior) = REQUIRED
  ];

  // Attributes are optional per-user key/value attributes attached to this
  // user's membership in the group (e.g. role, label).
  // Values can be either single strings or lists of strings.
  map<string, google.protobuf.Value> attributes = 2 [
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      example: "{\"role\":\"admin\",\"tags\":[\"tag1\",\"tag2\"]}";
    }
  ];
}

message GroupUser {
  // GroupID is the unique identifier of the user group.
  string group_id = 1 [
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      example: "\"69629023906488334\""
    }
  ];

  // OrganizationID is the unique identifier of the organization to which the group belongs.
  string organization_id = 2 [
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      example: "\"69629098906488334\""
    }
  ];

  // User represents the user in the user group.
  zitadel.authorization.v2beta.User user = 3;

  // CreationDate is the timestamp when the user was added to the group.
  google.protobuf.Timestamp creation_date = 4 [
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      example: "\"2025-01-23T10:34:18.051Z\"";
    }
  ];

  // Attributes are per-user key/value attributes attached to this user's
  // membership in the group, supplied at add time via AddGroupUser.
  // Absent when no attributes were set.
  // Values can be either single strings or lists of strings.
  map<string, google.protobuf.Value> attributes = 5 [
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      example: "{\"role\":\"admin\",\"tags\":[\"tag1\",\"tag2\"]}";
    }
  ];
}

message GroupsSearchFilter {
  oneof filter {
    option (validate.required) = true;

    // Search for groups by their IDs.
    zitadel.filter.v2.InIDsFilter group_ids = 1;
    // Search for groups by their names.
    GroupNameFilter name_filter = 2;
    // Search for groups by their organization ID.
    zitadel.filter.v2.IDFilter organization_id = 3;
  }
}

message GroupNameFilter {
  // Name of the user group.
  string name = 1 [
    (validate.rules).string = {min_len: 1, max_len: 200},
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      min_length: 1;
      max_length: 200;
      example: "\"My Group\"";
    }
  ];

  // Defines which text comparison method used for the name query.
  zitadel.filter.v2.TextFilterMethod method = 2 [
    (validate.rules).enum.defined_only = true,
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      description: "defines which text equality method is used";
    }
  ];
}


enum FieldName {
  FIELD_NAME_UNSPECIFIED = 0;
  FIELD_NAME_ID = 1;
  FIELD_NAME_NAME = 2;
  FIELD_NAME_CREATION_DATE = 3;
  FIELD_NAME_CHANGE_DATE = 4;
}

message GroupUsersSearchFilter {
  oneof filter {
    option (validate.required) = true;

    // Search for groups by user IDs
    zitadel.filter.v2.InIDsFilter user_ids = 1;
    // Search for users in groups by group IDs
    zitadel.filter.v2.InIDsFilter group_ids = 2;
  }
}

enum GroupUserFieldName {
  GROUP_USER_FIELD_NAME_UNSPECIFIED = 0;
  GROUP_USER_FIELD_NAME_USER_ID = 1;
  GROUP_USER_FIELD_NAME_GROUP_ID = 2;
  GROUP_USER_FIELD_NAME_CREATION_DATE = 3;
}