syntax = "proto3";

package zitadel.settings.v2;

option go_package = "github.com/zitadel/zitadel/pkg/grpc/settings/v2;settings";

import "google/protobuf/duration.proto";
import "validate/validate.proto";
import "zitadel/object/v2/object.proto";

message DetectionSettings {
  bool enabled = 1;
  bool fail_open = 2;
  uint32 failure_burst_threshold = 3 [(validate.rules).uint32.gt = 0];
  google.protobuf.Duration history_window = 4 [(validate.rules).duration = {gt: {seconds: 0}}];
  google.protobuf.Duration context_change_window = 5 [(validate.rules).duration = {gt: {seconds: 0}}];
  uint32 max_signals_per_user = 6 [(validate.rules).uint32.gt = 0];
  uint32 max_signals_per_session = 7 [(validate.rules).uint32.gt = 0];
}

message GetDetectionSettingsRequest {}

message GetDetectionSettingsResponse {
  DetectionSettings settings = 1;
}

message SetDetectionSettingsRequest {
  DetectionSettings settings = 1 [(validate.rules).message.required = true];
}

message SetDetectionSettingsResponse {
  zitadel.object.v2.Details details = 1;
}
