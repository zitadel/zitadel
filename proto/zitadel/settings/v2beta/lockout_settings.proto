syntax = "proto3";

package zitadel.settings.v2beta;

option go_package = "github.com/zitadel/zitadel/pkg/grpc/settings/v2beta;settings";

import "protoc-gen-openapiv2/options/annotations.proto";
import "zitadel/settings/v2beta/settings.proto";

message LockoutSettings {
  uint64 max_password_attempts = 1 [
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      description: "Maximum password check attempts before the account gets locked. Attempts are reset as soon as the password is entered correctly or the password is reset. If set to 0 the account will never be locked."
      example: "\"10\""
    }
  ];
  // resource_owner_type returns if the settings is managed on the organization or on the instance
  ResourceOwnerType resource_owner_type = 2 [
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      description: "resource_owner_type returns if the settings is managed on the organization or on the instance";
    }
  ];
  uint64 max_otp_attempts = 3 [
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      description: "Maximum failed attempts for a single OTP type (TOTP, SMS, Email) before the account gets locked. Attempts are reset as soon as the OTP is entered correctly. If set to 0 the account will never be locked."
      example: "\"10\""
    }
  ];

    // The amount of minutes after the account gets automatically unlocked.
  // If set to 0 the account will never be automatically unlocked.
  uint64 auto_unlock_after_min = 4 [
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      description: "Amount of minutes after which the account will be automatically unlocked. If set to 0 the account will never be unlocked automatically."
      example: "\"60\""
    }
  ];
  bool show_remaining_lockout_time = 5 [
      (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
        description: "Defines if the remaining lockout time should be shown to the user on the login screen after the account got locked."
        example: "\"true\""
      }
  ];
  bool show_absolute_lockout_time = 6 [
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
        description: "Defines if the absolute lockout time should be shown to the user on the login screen after the account got locked. Takes affect if show_remaining_lockout_time is set to false."
        example: "\"true\""
    }
  ];
}
