# Test overlay for x509 system API user authentication.
# Uses a locally-built API image and a published login image.
#
# This overlay tests the API-side ZITADEL_LOGINCLIENT_KEYFILE verifier changes only.
# The API container receives the certificate (public key) via ZITADEL_LOGINCLIENT_KEYFILE
# to verify JWTs. The login container uses legacy env vars (ZITADEL_LOGIN_SERVICE_KEY_FILE)
# because it runs a published image. To test the login-side env var path, build a local
# login image via the Nx @zitadel/login:pack target and switch to zitadel/zitadel-login:local.
#
# Usage:
#   docker compose --env-file .env.test -f docker-compose.yml -f docker-compose.x509-test.yml up --force-recreate --renew-anon-volumes --wait

services:
  zitadel-api:
    image: zitadel/zitadel:local
    environment:
      ZITADEL_LOGINCLIENT_KEYFILE: /zitadel/certs/system-api.crt
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORD: Password1!
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORDCHANGEREQUIRED: "false"
    volumes:
      - zitadel-bootstrap:/zitadel/bootstrap:rw
      - ./certs/system-api.crt:/zitadel/certs/system-api.crt:ro

  zitadel-login:
    # Use published image for testing. It supports ZITADEL_LOGIN_SERVICE_KEY_FILE
    # (backward compat). Once a local build with ZITADEL_LOGINCLIENT_KEYFILE is
    # available, switch to zitadel/zitadel-login:local.
    image: ghcr.io/zitadel/zitadel-login:v4.12.3
    environment:
      ZITADEL_LOGIN_SERVICE_KEY_FILE: /zitadel/certs/system-api.key
      ZITADEL_LOGIN_SYSTEM_USER_ID: login-client
      ZITADEL_SERVICE_USER_TOKEN_FILE: ""
      AUDIENCE: http://localhost:8888
    healthcheck:
      test:
        - CMD
        - /bin/sh
        - -c
        - node /app/healthcheck.mjs http://localhost:3000/ui/v2/login/healthy
      interval: 10s
      timeout: 30s
      retries: 12
      start_period: 20s
    volumes:
      - zitadel-bootstrap:/zitadel/bootstrap:ro
      - ./certs/system-api.key:/zitadel/certs/system-api.key:ro
