ExternalSecure: false
TLS.Enabled: false
Database.Postgres:
  Database: zitadelMCP2
  AwaitInitialConn: 5m
  MaxOpenConns: 20
  MaxIdleConns: 20
  ConnMaxLifetime: 60m
  ConnMaxIdleTime: 10m
FirstInstance:
  LoginClientPatPath: login-client.pat
  PatPath: admin.pat
  InstanceName: ZITADEL
  DefaultLanguage: en
  Org:
    LoginClient:
      Machine:
        Username: login-client
        Name: Automatically Initialized instance Login Client
      Pat.ExpirationDate: 2099-01-01T00:00:00Z
    Machine:
      Machine:
        Username: admin
        Name: Automatically Initialized instance admin Client
      Pat.ExpirationDate: 2099-01-01T00:00:00Z
DefaultInstance:
  Features:
    LoginV2:
      Required: false
    OIDCDynamicClientRegistration: true
    KeyOIDCClientIDMetadataDocument: true
OIDC:
  DynamicClientRegistration:
    AllowUnauthenticated: true
