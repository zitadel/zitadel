<h2 mat-dialog-title>{{ 'GROUPS.MEMBERS.TITLE' | translate }} — {{ data.group.name }}</h2>

<mat-dialog-content>
  <cnsl-search-user-autocomplete [target]="UserTarget.SELF" (selectionChanged)="selectionChanged($event)">
  </cnsl-search-user-autocomplete>

  <div class="members-list" *ngIf="!loading()">
    <div class="member-row" *ngFor="let member of members()">
      <div class="member-info">
        <span class="display-name">{{ member.user?.displayName }}</span>
        <span class="cnsl-secondary-text">{{ member.user?.preferredLoginName }}</span>
      </div>
      <button
        mat-icon-button
        color="warn"
        matTooltip="{{ 'ACTIONS.REMOVE' | translate }}"
        data-e2e="group-member-remove"
        (click)="removeUser(member)"
      >
        <i class="las la-trash"></i>
      </button>
    </div>
    <div class="member-row empty" *ngIf="members().length === 0">
      <span class="cnsl-secondary-text">{{ 'GROUPS.MEMBERS.EMPTY' | translate }}</span>
    </div>
  </div>
</mat-dialog-content>

<div mat-dialog-actions class="action">
  <button mat-stroked-button (click)="close()">
    {{ 'ACTIONS.CLOSE' | translate }}
  </button>

  <button
    [disabled]="!usersToAdd.length"
    color="primary"
    mat-raised-button
    class="ok-button"
    data-e2e="group-members-add"
    (click)="addUsers()"
  >
    {{ 'GROUPS.MEMBERS.ADD' | translate }}
  </button>
</div>
