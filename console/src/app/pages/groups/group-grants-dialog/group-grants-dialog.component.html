<h2 mat-dialog-title>{{ 'GROUPS.GRANTS.TITLE' | translate }} — {{ data.group.name }}</h2>

<mat-dialog-content>
  <p class="cnsl-secondary-text">{{ 'GROUPS.GRANTS.DESCRIPTION' | translate }}</p>

  <form class="add-grant" [formGroup]="grantForm" (ngSubmit)="addGrant()">
    <cnsl-form-field class="grant-field">
      <cnsl-label>{{ 'GROUPS.GRANTS.PROJECTID' | translate }}</cnsl-label>
      <input cnslInput formControlName="projectId" data-e2e="group-grant-project-input" />
    </cnsl-form-field>
    <cnsl-form-field class="grant-field">
      <cnsl-label>{{ 'GROUPS.GRANTS.ROLEKEYS' | translate }}</cnsl-label>
      <input cnslInput formControlName="roleKeys" data-e2e="group-grant-roles-input" />
    </cnsl-form-field>
    <button
      mat-raised-button
      color="primary"
      type="submit"
      data-e2e="group-grant-save"
      [disabled]="grantForm.invalid"
    >
      {{ 'GROUPS.GRANTS.ADD' | translate }}
    </button>
  </form>

  <div class="grants-list" *ngIf="!loading()">
    <div class="grant-row" *ngFor="let grant of grants()">
      <div class="grant-info">
        <span class="project">{{ grant.projectId }}</span>
        <span class="cnsl-secondary-text">{{ grant.roleKeys.join(', ') }}</span>
      </div>
      <button
        mat-icon-button
        color="warn"
        matTooltip="{{ 'ACTIONS.REMOVE' | translate }}"
        data-e2e="group-grant-remove"
        (click)="removeGrant(grant)"
      >
        <i class="las la-trash"></i>
      </button>
    </div>
    <div class="grant-row empty" *ngIf="grants().length === 0">
      <span class="cnsl-secondary-text">{{ 'GROUPS.GRANTS.EMPTY' | translate }}</span>
    </div>
  </div>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-stroked-button (click)="dialogRef.close()">
    {{ 'ACTIONS.CLOSE' | translate }}
  </button>
</mat-dialog-actions>
