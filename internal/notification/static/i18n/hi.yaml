InitCode:
  Title: "उपयोगकर्ता को आरंभ करें"
  PreHeader: "उपयोगकर्ता को आरंभ करें"
  Subject: "उपयोगकर्ता को आरंभ करें"
  Greeting: "नमस्ते {{.DisplayName}},"
  Text: "यह उपयोगकर्ता बनाया गया है। लॉगिन के लिए उपयोगकर्ता नाम {{.PreferredLoginName}} का उपयोग करें। कृपया आरंभीकरण प्रक्रिया को पूरा करने के लिए नीचे दिए गए बटन पर क्लिक करें। (कोड {{.Code}}) यदि आपने इस मेल का अनुरोध नहीं किया है, तो कृपया इसे अनदेखा करें।"
  ButtonText: "आरंभीकरण पूरा करें"
PasswordReset:
  Title: "पासवर्ड रीसेट करें"
  PreHeader: "पासवर्ड रीसेट करें"
  Subject: "पासवर्ड रीसेट करें"
  Greeting: "नमस्ते {{.DisplayName}},"
  Text: "हमें एक पासवर्ड रीसेट अनुरोध प्राप्त हुआ है। कृपया अपना पासवर्ड रीसेट करने के लिए नीचे दिए गए बटन का उपयोग करें। (कोड {{.Code}}) यदि आपने इस मेल का अनुरोध नहीं किया है, तो कृपया इसे अनदेखा करें।"
  ButtonText: "पासवर्ड रीसेट करें"
VerifyEmail:
  Title: "ईमेल सत्यापित करें"
  PreHeader: "ईमेल सत्यापित करें"
  Subject: "ईमेल सत्यापित करें"
  Greeting: "नमस्ते {{.DisplayName}},"
  Text: "एक नया ईमेल जोड़ा गया है। कृपया अपने ईमेल की पुष्टि करने के लिए नीचे दिए गए बटन का उपयोग करें। (कोड {{.Code}}) यदि आपने कोई नया ईमेल नहीं जोड़ा है, तो कृपया इस मेल की अनदेखी करें।"
  ButtonText: "ईमेल सत्यापित करें"
VerifyPhone:
  Title: "फोन सत्यापित करें"
  PreHeader: "फोन सत्यापित करें"
  Subject: "फोन सत्यापित करें"
  Greeting: "नमस्ते {{.DisplayName}},"
  Text: "एक नया फोन नंबर जोड़ा गया है। कृपया इसे सत्यापित करने के लिए निम्नलिखित कोड का उपयोग करें {{.Code}}"
  ButtonText: "फोन सत्यापित करें"
VerifyEmailOTP:
  Title: "OTP सत्यापित करें"
  PreHeader: "OTP सत्यापित करें"
  Subject: "OTP सत्यापित करें"
  Greeting: "नमस्ते {{.DisplayName}},"
  Text: "कृपया अगले पांच मिनटों के भीतर प्रमाणीकरण के लिए OTP {{.OTP}} का उपयोग करें या \"प्रमाणीकरण\" बटन पर क्लिक करें।"
  ButtonText: "प्रमाणीकरण"
VerifySMSOTP:
  Text: |-
    {{.OTP}} आपके {{ .Domain }} के लिए आपका OTP है। इसे {{.Expiry}} के भीतर उपयोग करें।
    @{{.Domain}} #{{.OTP}}
DomainClaimed:
  Title: "डोमेन पर दावा किया गया"
  PreHeader: "ईमेल / उपयोगकर्ता नाम बदलें"
  Subject: "डोमेन पर दावा किया गया"
  Greeting: "नमस्ते {{.DisplayName}},"
  Text: "डोमेन {{.Domain}} पर एक संगठन द्वारा दावा किया गया है। आपका वर्तमान उपयोगकर्ता {{.Username}} इस संगठन का हिस्सा नहीं है। इसलिए आपको लॉगिन करते समय अपना ईमेल बदलना होगा। हमने इस लॉगिन के लिए एक अस्थायी उपयोगकर्ता नाम ({{.TempUsername}}) बनाया है।"
  ButtonText: "लॉगिन"
PasswordlessRegistration:
  Title: "पासकी लॉगिन जोड़ें"
  PreHeader: "पासकी लॉगिन जोड़ें"
  Subject: "पासकी लॉगिन जोड़ें"
  Greeting: "नमस्ते {{.DisplayName}},"
  Text: "हमें पासकी लॉगिन के लिए एक टोकन जोड़ने का अनुरोध प्राप्त हुआ है। कृपया अपना टोकन या पासकी लॉगिन के लिए डिवाइस जोड़ने के लिए नीचे दिए गए बटन का उपयोग करें।"
  ButtonText: "पासकी लॉगिन जोड़ें"
PasswordChange:
  Title: "उपयोगकर्ता का पासवर्ड बदल गया"
  PreHeader: "पासवर्ड बदलें"
  Subject: "उपयोगकर्ता का पासवर्ड बदल गया"
  Greeting: "नमस्ते {{.DisplayName}},"
  Text: "आपके उपयोगकर्ता का पासवर्ड बदल दिया गया है। यदि यह परिवर्तन आपके द्वारा नहीं किया गया था, तो कृपया तुरंत अपना पासवर्ड रीसेट करने के लिए सलाह दी जाती है।"
  ButtonText: "लॉगिन"
InviteUser:
  Title: "{{.ApplicationName}} में आमंत्रण"
  PreHeader: "{{.ApplicationName}} में आमंत्रण"
  Subject: "{{.ApplicationName}} में आमंत्रण"
  Greeting: "नमस्ते {{.DisplayName}},"
  Text: "आपके उपयोगकर्ता को {{.ApplicationName}} में आमंत्रित किया गया है। कृपया आमंत्रण प्रक्रिया को पूरा करने के लिए नीचे दिए गए बटन पर क्लिक करें। यदि आपने इस मेल का अनुरोध नहीं किया है, तो कृपया इसे अनदेखा करें।"
  ButtonText: "आमंत्रण स्वीकार करें"
