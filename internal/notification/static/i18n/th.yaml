InitCode:
  Title: ตั้งค่าเริ่มต้นผู้ใช้
  PreHeader: ตั้งค่าเริ่มต้นผู้ใช้
  Subject: ตั้งค่าเริ่มต้นผู้ใช้
  Greeting: สวัสดี {{.DisplayName}},
  Text: มีการสร้างผู้ใช้นี้แล้ว โปรดใช้ชื่อผู้ใช้ {{.PreferredLoginName}} เพื่อเข้าสู่ระบบ กรุณาคลิกปุ่มด้านล่างเพื่อดำเนินการตั้งค่าเริ่มต้นให้เสร็จสมบูรณ์ (รหัส {{.Code}}) หากคุณไม่ได้ร้องขออีเมลฉบับนี้ โปรดละเว้น
  ButtonText: เสร็จสิ้นการตั้งค่าเริ่มต้น
PasswordReset:
  Title: รีเซ็ตรหัสผ่าน
  PreHeader: รีเซ็ตรหัสผ่าน
  Subject: รีเซ็ตรหัสผ่าน
  Greeting: สวัสดี {{.DisplayName}},
  Text: เราได้รับคำขอรีเซ็ตรหัสผ่าน โปรดใช้ปุ่มด้านล่างเพื่อรีเซ็ตรหัสผ่านของคุณ (รหัส {{.Code}}) หากคุณไม่ได้ร้องขออีเมลฉบับนี้ โปรดละเว้น
  ButtonText: รีเซ็ตรหัสผ่าน
VerifyEmail:
  Title: ยืนยันอีเมล
  PreHeader: ยืนยันอีเมล
  Subject: ยืนยันอีเมล
  Greeting: สวัสดี {{.DisplayName}},
  Text: มีการเพิ่มอีเมลใหม่ โปรดใช้ปุ่มด้านล่างเพื่อยืนยันอีเมลของคุณ (รหัส {{.Code}}) หากคุณไม่ได้เพิ่มอีเมลใหม่ โปรดละเว้นอีเมลฉบับนี้
  ButtonText: ยืนยันอีเมล
VerifyPhone:
  Title: ยืนยันโทรศัพท์
  PreHeader: ยืนยันโทรศัพท์
  Subject: ยืนยันโทรศัพท์
  Greeting: สวัสดี {{.DisplayName}},
  Text: มีการเพิ่มหมายเลขโทรศัพท์ใหม่ โปรดใช้รหัสต่อไปนี้เพื่อยืนยัน {{.Code}}
  ButtonText: ยืนยันโทรศัพท์
VerifyEmailOTP:
  Title: ยืนยัน OTP
  PreHeader: ยืนยัน OTP
  Subject: ยืนยัน OTP
  Greeting: สวัสดี {{.DisplayName}},
  Text: โปรดใช้ OTP {{.OTP}} เพื่อยืนยันตัวตนภายในห้านาทีถัดไป หรือคลิกปุ่ม "ยืนยันตัวตน"
  ButtonText: ยืนยันตัวตน
VerifySMSOTP:
  Text: >-
    {{.OTP}} คือ OTP ของคุณสำหรับ {{ .Domain }} โปรดใช้ภายใน {{.Expiry}} ถัดไป.
    
    @{{.Domain}} #{{.OTP}}
DomainClaimed:
  Title: มีการอ้างสิทธิ์โดเมนแล้ว
  PreHeader: เปลี่ยนอีเมล / ชื่อผู้ใช้
  Subject: มีการอ้างสิทธิ์โดเมนแล้ว
  Greeting: สวัสดี {{.DisplayName}},
  Text: โดเมน {{.Domain}} ถูกอ้างสิทธิ์โดยองค์กรแล้ว ผู้ใช้ปัจจุบันของคุณ {{.Username}} ไม่ได้เป็นส่วนหนึ่งขององค์กรนี้ ดังนั้นคุณจะต้องเปลี่ยนอีเมลเมื่อเข้าสู่ระบบ เราได้สร้างชื่อผู้ใช้ชั่วคราว ({{.TempUsername}}) สำหรับการเข้าสู่ระบบครั้งนี้แล้ว
  ButtonText: เข้าสู่ระบบ
PasswordlessRegistration:
  Title: เพิ่มการเข้าสู่ระบบด้วย Passkey
  PreHeader: เพิ่มการเข้าสู่ระบบด้วย Passkey
  Subject: เพิ่มการเข้าสู่ระบบด้วย Passkey
  Greeting: สวัสดี {{.DisplayName}},
  Text: เราได้รับคำขอให้เพิ่มโทเค็นสำหรับการเข้าสู่ระบบด้วย Passkey โปรดใช้ปุ่มด้านล่างเพื่อเพิ่มโทเค็นหรืออุปกรณ์ของคุณสำหรับการเข้าสู่ระบบด้วย Passkey
  ButtonText: เพิ่มการเข้าสู่ระบบด้วย Passkey
PasswordChange:
  Title: รหัสผ่านของผู้ใช้ถูกเปลี่ยนแล้ว
  PreHeader: เปลี่ยนรหัสผ่าน
  Subject: รหัสผ่านของผู้ใช้ถูกเปลี่ยนแล้ว
  Greeting: สวัสดี {{.DisplayName}},
  Text: รหัสผ่านของผู้ใช้ของคุณถูกเปลี่ยนแล้ว หากการเปลี่ยนแปลงนี้ไม่ได้เกิดขึ้นโดยคุณ โปรดรีเซ็ตรหัสผ่านของคุณทันที
  ButtonText: เข้าสู่ระบบ
InviteUser:
  Title: คำเชิญเข้าร่วม {{.ApplicationName}}
  PreHeader: คำเชิญเข้าร่วม {{.ApplicationName}}
  Subject: คำเชิญเข้าร่วม {{.ApplicationName}}
  Greeting: สวัสดี {{.DisplayName}},
  Text: ผู้ใช้ของคุณได้รับเชิญให้เข้าร่วม {{.ApplicationName}} โปรดคลิกปุ่มด้านล่างเพื่อดำเนินการตอบรับคำเชิญให้เสร็จสมบูรณ์ หากคุณไม่ได้ร้องขออีเมลฉบับนี้ โปรดละเว้น
  ButtonText: ตอบรับคำเชิญ
