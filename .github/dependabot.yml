version: 2
updates:
  # ── Go modules ────────────────────────────────────────────────────────────
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: monthly
      day: monday
      time: "02:00"
    groups:
      go-version-updates:
        applies-to: version-updates
        patterns: ["*"]
        update-types: ["minor", "patch"]
      go-security-updates:
        applies-to: security-updates
        patterns: ["*"]
    labels: ["gomod", "dependencies"]
    commit-message:
      prefix: "chore(deps-go)"

  # ── npm (pnpm workspace — use root only, see dependabot/dependabot-core#11487)
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: monthly
      day: monday
      time: "02:00"
    groups:
      npm-version-updates:
        applies-to: version-updates
        patterns: ["*"]
        update-types: ["minor", "patch"]
      npm-security-updates:
        applies-to: security-updates
        patterns: ["*"]
    ignore:
      - dependency-name: "eslint"
        versions: ["9.x"]
    labels: ["npm", "dependencies"]
    commit-message:
      prefix: "chore(deps-npm)"

  # ── Docker (consolidated) ────────────────────────────────────────────────
  - package-ecosystem: docker
    directories:
      - "/build"
      - "/.devcontainer"
      - "/apps/login"
      - "/apps/login/integration/api-mock"
      - "/apps/api"
    schedule:
      interval: monthly
      day: monday
      time: "02:00"
    groups:
      docker-version-updates:
        applies-to: version-updates
        patterns: ["*"]
        update-types: ["minor", "patch"]
      docker-security-updates:
        applies-to: security-updates
        patterns: ["*"]
    labels: ["dependencies"]
    commit-message:
      prefix: "chore(deps-docker)"

  # ── GitHub Actions ────────────────────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
      day: monday
      time: "02:00"
    groups:
      actions-version-updates:
        applies-to: version-updates
        patterns: ["*"]
      actions-security-updates:
        applies-to: security-updates
        patterns: ["*"]
    labels: ["dependencies"]
    commit-message:
      prefix: "chore(deps-actions)"
