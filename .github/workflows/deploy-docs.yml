name: Deploy Docs

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: "Deploy target (production deploys to live site)"
        type: choice
        options:
          - production
          - preview
        default: production

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  deployments: write
  statuses: write

jobs:
  deploy:
    name: Build and Deploy Docs
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          filter: tree:0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set SHAs for nx affected
        uses: nrwl/nx-set-shas@v4

      - name: Check if docs are affected
        id: affected
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "affected=true" >> $GITHUB_OUTPUT
          elif pnpm nx show projects --affected --plain | grep -qxF '@zitadel/docs'; then
            echo "affected=true" >> $GITHUB_OUTPUT
          else
            echo "affected=false" >> $GITHUB_OUTPUT
          fi
        env:
          NX_DAEMON: "false"
          NX_DISABLE_DB: "true"

      - name: Determine deploy environment
        if: steps.affected.outputs.affected == 'true'
        id: env
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "target=preview" >> $GITHUB_OUTPUT
            echo "is_prod=false" >> $GITHUB_OUTPUT
            echo "env_name=Preview – docs" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.environment }}" = "preview" ]; then
            echo "target=preview" >> $GITHUB_OUTPUT
            echo "is_prod=false" >> $GITHUB_OUTPUT
            echo "env_name=Preview – docs" >> $GITHUB_OUTPUT
          else
            echo "target=production" >> $GITHUB_OUTPUT
            echo "is_prod=true" >> $GITHUB_OUTPUT
            echo "env_name=Production – docs" >> $GITHUB_OUTPUT
          fi

      - name: Build docs (Nx pipeline)
        if: steps.affected.outputs.affected == 'true'
        run: pnpm nx run @zitadel/docs:build
        env:
          NX_DAEMON: "false"
          NX_DISABLE_DB: "true"

      - name: Pull Vercel project settings
        if: steps.affected.outputs.affected == 'true'
        run: pnpm exec vercel pull --yes --environment=${{ steps.env.outputs.target }} --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/docs
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_DOCS }}

      - name: Package for Vercel
        if: steps.affected.outputs.affected == 'true'
        run: pnpm exec vercel build ${{ steps.env.outputs.is_prod == 'true' && '--prod' || '' }} --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/docs
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_DOCS }}
      - name: Deploy to Vercel
        if: steps.affected.outputs.affected == 'true'
        id: deploy
        run: |
          DEPLOY_URL=$(pnpm exec vercel deploy --prebuilt ${{ steps.env.outputs.is_prod == 'true' && '--prod' || '' }} --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$DEPLOY_URL" >> $GITHUB_OUTPUT
        working-directory: apps/docs
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_DOCS }}

      - name: Create GitHub deployment status
        if: steps.deploy.outputs.url != ''
        uses: actions/github-script@v7
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: '${{ steps.env.outputs.env_name }}',
              auto_merge: false,
              required_contexts: [],
              description: 'Docs deployment via Vercel CLI',
              transient_environment: ${{ steps.env.outputs.is_prod != 'true' }},
              production_environment: ${{ steps.env.outputs.is_prod == 'true' }},
            });
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.data.id,
              state: 'success',
              environment_url: '${{ steps.deploy.outputs.url }}',
              log_url: '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}',
              description: 'Deployment succeeded',
            });

      - name: Set commit status (Vercel – docs)
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const deployed = '${{ steps.deploy.outputs.url }}';
            const affected = '${{ steps.affected.outputs.affected }}';
            let state, description, target_url;
            if (deployed) {
              state = 'success';
              description = 'Deployment has completed';
              target_url = deployed;
            } else if (affected !== 'true') {
              state = 'success';
              description = 'Docs not affected — deploy skipped';
              target_url = '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}';
            } else {
              state = 'failure';
              description = 'Deployment failed';
              target_url = '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}';
            }
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state,
              description,
              target_url,
              context: 'Vercel \u2013 docs',
            });

      - name: Comment preview URL on PR
        if: steps.deploy.outputs.url != '' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- vercel-docs-preview -->';
            const body = [
              marker,
              `**Docs Preview** :rocket: ${{ steps.deploy.outputs.url }}`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
