name: Deploy Docs

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: "Deploy target (production deploys to live site)"
        type: choice
        options:
          - production
          - preview
        default: production

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  deployments: write
  statuses: write

jobs:
  deploy:
    name: Build and Deploy Docs
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          filter: tree:0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set SHAs for nx affected
        uses: nrwl/nx-set-shas@v4

      - name: Check if docs are affected
        id: affected
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "affected=true" >> $GITHUB_OUTPUT
          elif pnpm nx show projects --affected --plain | grep -qxF '@zitadel/docs'; then
            echo "affected=true" >> $GITHUB_OUTPUT
          else
            echo "affected=false" >> $GITHUB_OUTPUT
          fi
        env:
          NX_DAEMON: "false"
          NX_DISABLE_DB: "true"

      - name: Determine deploy environment
        if: steps.affected.outputs.affected == 'true'
        id: env
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "target=preview" >> $GITHUB_OUTPUT
            echo "is_prod=false" >> $GITHUB_OUTPUT
            echo "env_name=Preview – docs" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.environment }}" = "preview" ]; then
            echo "target=preview" >> $GITHUB_OUTPUT
            echo "is_prod=false" >> $GITHUB_OUTPUT
            echo "env_name=Preview – docs" >> $GITHUB_OUTPUT
          else
            echo "target=production" >> $GITHUB_OUTPUT
            echo "is_prod=true" >> $GITHUB_OUTPUT
            echo "env_name=Production – docs" >> $GITHUB_OUTPUT
          fi

      - name: Build docs (Nx pipeline)
        if: steps.affected.outputs.affected == 'true'
        run: pnpm nx run @zitadel/docs:build
        env:
          NX_DAEMON: "false"
          NX_DISABLE_DB: "true"

      - name: Pull Vercel project settings
        if: steps.affected.outputs.affected == 'true'
        run: pnpm exec vercel pull --yes --environment=${{ steps.env.outputs.target }} --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/docs
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_DOCS }}

      # Enable corepack so @vercel/next builder uses pnpm@10 (from the packageManager field) via
      # corepack mode instead of the hardcoded /pnpm9/node_modules/.bin path (vercel/vercel#15204).
      - name: Enable corepack for pnpm@10
        if: steps.affected.outputs.affected == 'true'
        run: |
          PNPM_VERSION=$(node -p "require('./package.json').packageManager.split('@')[1].split('+')[0]")
          corepack enable pnpm
          corepack prepare "pnpm@${PNPM_VERSION}" --activate

      - name: Package for Vercel
        if: steps.affected.outputs.affected == 'true'
        run: pnpm exec vercel build ${{ steps.env.outputs.is_prod == 'true' && '--prod' || '' }} --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/docs
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_DOCS }}
          # Tell the Vercel CLI to use corepack for package manager invocation,
          # bypassing the hardcoded /pnpm9/node_modules/.bin path (vercel/vercel#15204).
          ENABLE_EXPERIMENTAL_COREPACK: "1"

      # amondnet/vercel-action handles vercel deploy --prebuilt, GitHub deployment, and PR comment.
      - name: Deploy to Vercel
        if: steps.affected.outputs.affected == 'true'
        id: deploy
        uses: amondnet/vercel-action@888da851026e0573da056b061931bcb765a915c4 # v41.1.4
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID_DOCS }}
          vercel-args: ${{ steps.env.outputs.is_prod == 'true' && '--prod --prebuilt' || '--prebuilt' }}
          working-directory: apps/docs
          github-deployment: 'true'

      - name: Set commit status (Vercel – docs)
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const deployed = '${{ steps.deploy.outputs.preview-url }}';
            const affected = '${{ steps.affected.outputs.affected }}';
            let state, description, target_url;
            if (deployed) {
              state = 'success';
              description = 'Deployment has completed';
              target_url = deployed;
            } else if (affected !== 'true') {
              state = 'success';
              description = 'Docs not affected — deploy skipped';
              target_url = '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}';
            } else {
              state = 'failure';
              description = 'Deployment failed';
              target_url = '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}';
            }
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state,
              description,
              target_url,
              context: 'Vercel \u2013 docs',
            });
