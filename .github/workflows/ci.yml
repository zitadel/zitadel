name: CI 

on:
  push:
    tags-ignore:
      - "*"
    branches:
      - "main"
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write
  issues: write
  pull-requests: write

jobs:
  read-versions:
    runs-on: ubuntu-latest
    outputs:
      go_version: ${{ steps.go.outputs.version }}
      node_version: ${{ steps.node.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Read Go version from go.mod
        id: go
        run: echo "version=$(grep -m1 '^go ' go.mod | awk '{print $2}')" >> "$GITHUB_OUTPUT"
      - name: Read Node version from .nvmrc
        id: node
        run: echo "version=$(cat .nvmrc)" >> "$GITHUB_OUTPUT"

  lint_test_build:
    needs: read-versions
    uses: ./.github/workflows/lint_test_build.yml
    if: ${{ github.ref != 'refs/heads/main' || github.event_name == 'workflow_dispatch' }}
    permissions:
      contents: read
    with:
      go_version: ${{ needs.read-versions.outputs.go_version }}
      node_version: ${{ needs.read-versions.outputs.node_version }}
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      NX_CLOUD_ACCESS_TOKEN_READONLY: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}

  pack:
    needs: read-versions
    uses: ./.github/workflows/pack.yml
    permissions:
      contents: write
      packages: write
    secrets:
      GCR_JSON_KEY_BASE64: ${{ secrets.GCR_JSON_KEY_BASE64 }}
    if: ${{ github.event_name == 'workflow_dispatch' }}
    with:
      go_version: ${{ needs.read-versions.outputs.go_version }}
      node_version: ${{ needs.read-versions.outputs.node_version }}
      semantic_version: "23.0.7"
      image_name_github_api: "ghcr.io/zitadel/zitadel"
      image_name_google_api: "europe-docker.pkg.dev/zitadel-common/zitadel-repo/zitadel"
      image_name_github_login: "ghcr.io/zitadel/zitadel-login"
      image_name_google_login: "europe-docker.pkg.dev/zitadel-common/zitadel-repo/zitadel-login"

  release:
    uses: ./.github/workflows/release.yml
    permissions:
      packages: write
      contents: write
      issues: write
      pull-requests: write
    needs:
      - read-versions
      - lint_test_build
      - pack
    if: ${{ github.event_name == 'workflow_dispatch' }}
    secrets:
      GCR_JSON_KEY_BASE64: ${{ secrets.GCR_JSON_KEY_BASE64 }}
      APP_ID: ${{ secrets.APP_ID }}
      APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
    with:
      semantic_version: "23.0.7"
      image_name_github_api: "ghcr.io/zitadel/zitadel"
      image_name_google_api: "europe-docker.pkg.dev/zitadel-common/zitadel-repo/zitadel"
      image_name_github_login: "ghcr.io/zitadel/zitadel-login"
      image_name_google_login: "europe-docker.pkg.dev/zitadel-common/zitadel-repo/zitadel-login"
