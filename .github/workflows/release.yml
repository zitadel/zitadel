name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-24.04-16core
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          cache: true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Google Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: europe-docker.pkg.dev
          username: _json_key_base64
          password: ${{ secrets.GCR_JSON_KEY_BASE64 }}

      - name: Resolve previous release tag
        id: prev-tag
        run: |
          CURRENT="${GITHUB_REF_NAME}"
          # List all tags, filter for semver (vX.Y.Z with optional pre-release), sort descending, skip current
          PREV=$(git tag -l | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+' | grep -v "^${CURRENT}$" | sort -V -r | head -n 1)
          echo "previous_tag=${PREV}" >> "$GITHUB_OUTPUT"
          echo "Previous tag: ${PREV} (current: ${CURRENT})"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          #args: release --clean
          #This is to test the release pipeline
          args: release --draft --skip publish --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}
          GORELEASER_PREVIOUS_TAG: ${{ steps.prev-tag.outputs.previous_tag }}