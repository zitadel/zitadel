name: Devcontainer

on:
  push:
    paths:
      - '.devcontainer/**'
      - '.nvmrc'
      - 'go.mod'
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag (e.g. 2025.03.1)'
        required: true

env:
  IMAGE: ghcr.io/zitadel/devcontainer

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push devcontainer
        uses: devcontainers/ci@v0.3
        with:
          imageName: ${{ env.IMAGE }}
          imageTag: ${{ steps.tag.outputs.tag }},${{ github.sha }}
          push: always
